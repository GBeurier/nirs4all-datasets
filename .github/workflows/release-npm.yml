# SPDX-License-Identifier: MIT
# Build, smoke-test, and publish the @nirs4all/datasets-wasm npm package.
#
# This is the JS/WASM leg of the release. It builds the wasm-pack `nodejs`
# target from bindings/wasm, post-processes the generated pkg-node/package.json
# to the scoped public name + npm provenance, runs the Node smoke test, and
# (on a non-rc tag / workflow_dispatch publish=true) publishes to npm.
#
# Triggers
# --------
# - push tag v*.*.*  -> build + smoke + (non-rc) publish to npm
# - workflow_dispatch (publish input) -> build + smoke + (publish=true) publish
#
# Publish requires the NPM_TOKEN repository secret (an automation token for the
# @nirs4all org) AND that the @nirs4all npm scope is owned by the maintainer.
# Provenance (publishConfig.provenance=true, injected below) needs the
# id-token: write permission and a public repo.
name: release-npm

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm (true) or dry-run only (false)'
        type: boolean
        default: false
  push:
    # GitHub tag filters are globs, not regex; '-rc'/pre-release tags still
    # match here and are filtered out of the publish step below.
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # npm provenance (OIDC)

env:
  # npm package name (scoped, public). The crate is nirs4all-datasets-wasm; the
  # published package is the short scoped name to match the docs / ecosystem.
  NPM_PKG_NAME: "@nirs4all/datasets-wasm"

jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        run: scripts/ensure_rust_deps.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # PIN the version. `version: latest` is non-deterministic with this
          # action and can resolve to an ancient wasm-pack whose bundled wasm-opt
          # cannot parse modern wasm-bindgen output. A pinned modern wasm-pack
          # ships a wasm-opt that handles it.
          version: 'v0.15.0'

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build the WASM module (wasm-pack, nodejs target)
        # --scope nirs4all primes the generated package.json with the @nirs4all
        # scope; the exact name + provenance are pinned in the next step.
        run: wasm-pack build bindings/wasm --release --target nodejs --out-dir pkg-node --scope nirs4all

      - name: Derive the canonical version (Cargo workspace SoT)
        id: ver
        run: |
          set -euo pipefail
          # Single source of truth: [workspace.package] version in root Cargo.toml,
          # kept in sync across bindings by scripts/bump_version.sh. npm/SemVer
          # accepts the Cargo spelling (e.g. 0.2.0-alpha.1) verbatim.
          VER=$(sed -nE '/^\[workspace\.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p}' Cargo.toml | head -n1)
          if [ -z "$VER" ]; then echo "::error::could not read [workspace.package] version"; exit 1; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Canonical version: $VER"

      - name: Pin package.json name + version + provenance
        working-directory: bindings/wasm/pkg-node
        env:
          PKG_VER: ${{ steps.ver.outputs.version }}
          PKG_NAME: ${{ env.NPM_PKG_NAME }}
        # wasm-pack derives the name/version from the crate; rewrite both to the
        # canonical SoT version and the scoped public name, and add the
        # publishConfig block (public access + OIDC provenance).
        run: |
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.name = process.env.PKG_NAME;
            p.version = process.env.PKG_VER;
            p.publishConfig = { access: "public", provenance: true };
            p.repository = { type: "git", url: "https://github.com/GBeurier/nirs4all-datasets.git", directory: "bindings/wasm" };
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
            console.log("package.json ->", p.name, p.version);
          '

      - name: Smoke-test the Node WASM module
        # The committed Node smoke test (bindings/wasm/tests/node_smoke.cjs)
        # requires the package at ../pkg; mirror the freshly built pkg-node there
        # so the smoke exercises exactly what we publish.
        run: |
          set -euo pipefail
          rm -rf bindings/wasm/pkg
          cp -r bindings/wasm/pkg-node bindings/wasm/pkg
          node bindings/wasm/tests/node_smoke.cjs

      - name: npm pack --dry-run (confirm wasm + js + d.ts ship)
        working-directory: bindings/wasm/pkg-node
        run: npm pack --dry-run

      - name: Validate tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: bindings/wasm/pkg-node
        run: |
          set -euo pipefail
          PKG_VER=$(node -p "require('./package.json').version")
          echo "package.json=$PKG_VER  tag=$GITHUB_REF_NAME"
          # The SoT version may carry a pre-release (-alpha.N); the publish step
          # only fires for non-pre-release tags, where PKG_VER == TAG_VER.
          if [ "$PKG_VER" != "${GITHUB_REF_NAME#v}" ]; then
            echo "ERROR: package.json version ($PKG_VER) != tag (${GITHUB_REF_NAME#v}). Run scripts/bump_version.sh and re-tag."
            exit 1
          fi

      - name: Decide publish
        id: gate
        run: |
          # Publish on a non-pre-release tag push, OR on workflow_dispatch with
          # publish=true. Pre-release tags (containing '-', e.g. -alpha.N/-rcN)
          # never publish.
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF_NAME}" == v* ]] && [[ "${GITHUB_REF_NAME}" != *-* ]]; then
            echo "do=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.publish }}" = "true" ]; then
            echo "do=true" >> "$GITHUB_OUTPUT"
          else
            echo "do=false" >> "$GITHUB_OUTPUT"
            echo "Dry-run only (no publish)."
          fi

      - name: Publish to npm (provenance)
        if: steps.gate.outputs.do == 'true'
        working-directory: bindings/wasm/pkg-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PKG_NAME: ${{ env.NPM_PKG_NAME }}
          PKG_VER: ${{ steps.ver.outputs.version }}
        # Idempotent publish: npm has no --skip-existing, and republishing an
        # already-published version is a hard "403 cannot publish over the
        # previously published versions". A re-run / re-tag of an already-released
        # version must be a no-op, so probe the registry first and only publish a
        # genuinely new version.
        run: |
          set -euo pipefail
          if npm view "${PKG_NAME}@${PKG_VER}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VER} already published; skipping."
          else
            npm publish --access public
          fi
