name: Release to PyPI

# Build + publish the package to PyPI on a version tag (e.g. `v0.2.0`), using PyPI Trusted Publishing
# (OIDC) — NO API token is stored. One-time setup is documented in docs/RELEASING.md:
#   1. create the `nirs4all-datasets` project on PyPI (or use a first manual `twine upload`),
#   2. add this repo + workflow as a Trusted Publisher on PyPI,
#   3. create a protected GitHub environment named `pypi` (optional manual-approval gate).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi  # protected environment (manual approval); configure in repo Settings -> Environments
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing (no stored secret)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
