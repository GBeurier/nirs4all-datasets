# SPDX-License-Identifier: MIT
# On a version tag, build the distributable artifacts for the Python + C-ABI
# surfaces and attach them to the GitHub Release:
#   - Python wheels (maturin, all 3 OS) → PyPI (Trusted Publishing / OIDC)
#   - Python sdist  (maturin)           → PyPI
#   - C-ABI archive (lib + header + LICENSE) → release asset (for C/R/MATLAB hosts)
#
# The Python package is the MAIN `nirs4all-datasets` distribution: the repo-root
# pyproject.toml is a maturin project that builds the pure-Python analysis layer
# (src/) AND the embedded native acquisition extension (nirs4all_datasets._n4ds,
# from bindings/python) into one wheel. maturin therefore builds from the repo
# ROOT (no `-m`), reading the root pyproject (which sets python-source=src,
# manifest-path=bindings/python/Cargo.toml, module=nirs4all_datasets._n4ds).
#
# The other surfaces live in their own workflows:
#   - JS/WASM npm package  → .github/workflows/release-npm.yml (@nirs4all/datasets-wasm)
#   - R source tarball     → .github/workflows/release-r.yml   (R-universe / Release asset)
#   - MATLAB/Octave zip    → .github/workflows/release-matlab.yml
#   - Rust crates          → .github/workflows/release-crates.yml (crates.io)
#   - Source + SBOM bundle → .github/workflows/release-source.yml
#
# Publish steps gate on a non-pre-release tag (no '-' in the tag) and on a real
# tag push (never workflow_dispatch). The Rust acquisition core is pure Rust
# (serde/sha2/ureq/...), so macOS binary wheels ship alongside Linux + Windows.
name: release-python
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts without publishing"
        required: false
        default: "true"

permissions:
  contents: write   # attach release assets
  id-token: write   # PyPI trusted publishing (OIDC)

jobs:
  python-wheels:
    name: Python wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        shell: bash
        run: scripts/ensure_rust_deps.sh
      # No `-m`: build from the repo-root pyproject so the wheel is the main
      # `nirs4all-datasets` package (src/ analysis layer + embedded _n4ds ext).
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  python-sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        run: scripts/ensure_rust_deps.sh
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  c-abi-archive:
    name: C-ABI archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        shell: bash
        run: scripts/ensure_rust_deps.sh
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p nirs4all-datasets-capi --release
      - name: Assemble archive
        shell: bash
        run: |
          stage="nirs4all-datasets-capi"
          mkdir -p "${stage}/lib" "${stage}/include" "${stage}/licenses"
          cp crates/nirs4all-datasets-capi/include/nirs4all_datasets.h "${stage}/include/"
          cp LICENSE "${stage}/licenses/MIT.txt"
          # Copy whatever shared/static libs this platform produced.
          find target/release -maxdepth 1 \
            \( -name 'libnirs4all_datasets_capi.*' -o -name 'nirs4all_datasets_capi.dll' -o -name 'nirs4all_datasets_capi.lib' \) \
            ! -name '*.d' ! -name '*.rlib' -exec cp {} "${stage}/lib/" \;
          tar -czf "nirs4all-datasets-capi-${{ matrix.os }}.tar.gz" "${stage}"
      - uses: actions/upload-artifact@v4
        with:
          name: c-abi-${{ matrix.os }}
          path: nirs4all-datasets-capi-*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [python-wheels, python-sdist]
    runs-on: ubuntu-latest
    # Gate to production tags only. Pre-release tags (anything containing '-',
    # e.g. v0.2.0-alpha.1) are excluded so they never reach PyPI; and never on
    # a workflow_dispatch dry run — only a real tag push publishes.
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && github.event_name != 'workflow_dispatch' }}
    # Use the `pypi` GitHub environment so the OIDC token carries an
    # `environment: pypi` claim — matching the Trusted Publisher configured on
    # pypi.org with Environment = `pypi` (owner=GBeurier, repo=nirs4all-datasets,
    # workflow=release-python.yml, Environment=`pypi`).
    environment:
      name: pypi
      url: https://pypi.org/p/nirs4all-datasets
    permissions:
      id-token: write
    steps:
      # Pull ONLY the Python wheels + sdist into dist/. A bare download-artifact
      # with no `pattern:`/`name:` grabs EVERY run artifact, which would drag the
      # C-ABI archives (nirs4all-datasets-capi-*.tar.gz) into dist/; the publish
      # action's twine pre-flight then rejects them ("InvalidDistribution: No
      # PKG-INFO in archive"). Wheels live under wheels-*, the sdist under sdist.
      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Download Python sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Validate tag matches the built wheel/sdist version
        run: |
          set -euo pipefail
          # The tag minus the leading 'v' must equal the PEP 440 package version
          # baked into the wheels + sdist. PEP 440 alpha/beta/rc spellings
          # (0.2.0a1, 0.2.0b2, 0.2.0rc1) are allowed alongside a plain X.Y.Z;
          # SemVer pre-release tags (with '-') are already gated out above.
          # scripts/bump_version.sh keeps the package version in sync with the
          # Cargo workspace SoT.
          tag_version="${GITHUB_REF_NAME#v}"
          # maturin normalizes to nirs4all_datasets-<version>-... for wheels and
          # nirs4all_datasets-<version>.tar.gz for the sdist.
          dist_file=$(ls dist/nirs4all_datasets-*.whl dist/nirs4all_datasets-*.tar.gz 2>/dev/null | head -n1 || true)
          if [[ -z "${dist_file}" ]]; then
            echo "::error::no nirs4all_datasets wheel/sdist found in dist/ to validate" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi
          base=$(basename "${dist_file}")
          rest="${base#nirs4all_datasets-}"
          dist_version="${rest%%-*}"               # wheel:  0.2.0a1-cp311-... -> 0.2.0a1
          dist_version="${dist_version%.tar.gz}"   # sdist:  0.2.0a1.tar.gz    -> 0.2.0a1
          # Auto-publish to the real PyPI index is PRODUCTION-ONLY: the tag must
          # be a plain vX.Y.Z. This is stricter than the job-level !contains('-')
          # gate (which lets a PEP 440 prerelease spelling like v0.2.0a1 slip
          # through, since it has no '-'); pre-releases are published manually.
          if [[ ! "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not a production release version (vX.Y.Z); pre-releases are not auto-published to PyPI" >&2
            exit 1
          fi
          if [[ "${tag_version}" != "${dist_version}" ]]; then
            echo "::error::Tag version (${tag_version}) != built package version (${dist_version})" >&2
            exit 1
          fi
          echo "tag ${GITHUB_REF_NAME} matches built package version ${dist_version}."
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Idempotent publish: a re-run / re-tag of an already-released version
          # skips files already on PyPI instead of failing the job with a
          # "400 File already exists" (PyPI forbids filename reuse). New files in
          # the same upload are still published.
          skip-existing: true

  github-release:
    name: Attach assets to the GitHub release
    needs: [python-wheels, python-sdist, c-abi-archive]
    runs-on: ubuntu-latest
    # Same gate as publish-pypi: production tags only, pre-release tags ('-')
    # excluded so a pre-release never cuts a public GitHub Release.
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && github.event_name != 'workflow_dispatch' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/*.whl
            assets/*.tar.gz
