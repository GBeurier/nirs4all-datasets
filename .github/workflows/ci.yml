name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        # The nirs4all extra pulls the published nirs4all (card metrics + to_nirs4all tests). The core
        # package no longer depends on the unpublished nirs4all-io (it was never imported) -- which both
        # unblocks PyPI install and fixes this CI install step.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,nirs4all]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --config-file pyproject.toml src
      - name: Validate catalog
        run: python catalog/scripts/validate.py
      - name: Catalog index is up to date
        run: |
          python -m nirs4all_datasets.cli catalog --root .
          git diff --exit-code catalog/datasets.yaml
      - name: Tests
        run: pytest -q
