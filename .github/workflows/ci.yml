# SPDX-License-Identifier: MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust green gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        run: scripts/ensure_rust_deps.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Put cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build core (no default features)
        run: cargo build -p nirs4all-datasets-core --no-default-features

  wasm:
    name: WASM/JS green gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        run: scripts/ensure_rust_deps.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.15.0'
      - name: Build Node WASM package
        run: wasm-pack build bindings/wasm --release --target nodejs --out-dir pkg-node --scope nirs4all
      - name: Pin package name used for npm
        working-directory: bindings/wasm/pkg-node
        run: |
          node -e '
            const fs = require("fs");
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.name = "@nirs4all/datasets-wasm";
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
          node -e 'const p = require("./package.json"); if (p.name !== "@nirs4all/datasets-wasm") throw new Error(p.name)'
      - name: Smoke-test Node WASM package
        run: node bindings/wasm/tests/node_smoke.cjs
      - name: npm pack dry-run
        working-directory: bindings/wasm/pkg-node
        run: npm pack --dry-run
      - name: Build browser WASM package
        run: wasm-pack build bindings/wasm --release --target web --out-dir pkg-web --scope nirs4all

  python:
    name: Python green gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout sibling Rust deps
        run: scripts/ensure_rust_deps.sh
      - uses: dtolnay/rust-toolchain@stable
      - name: Put cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install maturin
        run: uv tool install maturin
      - name: Install (editable, with the native acquisition extension)
        # The root pyproject is a maturin project: `uv pip install -e .[dev]`
        # builds the embedded `nirs4all_datasets._n4ds` Rust extension and the
        # pure-Python analysis layer together. The nirs4all card-metric bridge is
        # a separate optional extra (unpublished editable nirs4all), skipped here.
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run --no-sync ruff check .
      - name: Mypy
        run: uv run --no-sync mypy --config-file pyproject.toml src
      - name: Validate catalog descriptors
        run: uv run --no-sync python catalog/scripts/validate.py
      - name: Catalog index is up to date
        run: |
          uv run --no-sync python -m nirs4all_datasets.cli catalog --root .
          git diff --exit-code catalog/datasets.yaml
      - name: Pytest (no network)
        run: uv run --no-sync pytest -m "not network"
