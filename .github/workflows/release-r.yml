# SPDX-License-Identifier: MIT
# Build, install, smoke-test, and (on a release tag) attach the nirs4alldatasets
# R package source tarball.
#
# IMPORTANT — this is the methods-style / R-universe path. The R binding is a C
# SHIM over the PREBUILT nirs4all-datasets-capi cdylib: bindings/r/src links
# `-lnirs4all_datasets_capi` via N4DS_INCLUDE / N4DS_CAPI_DIR (see the package
# Makevars). There is no extendr, no src/rust/, no relative crate path deps.
#
# Because the package links a separately-built cdylib, the
# `nirs4alldatasets_<version>.tar.gz` produced here is an R-UNIVERSE / GitHub-
# RELEASE ASSET, NOT a CRAN-self-contained tarball: it cannot build on CRAN's
# farm without the prebuilt libnirs4all_datasets_capi on the system. A
# CRAN-submittable R package requires REWORKING the binding to vendor + compile
# the Rust core at install time — tracked as a follow-up.
#
# Triggers
# --------
# - workflow_dispatch        -> on-demand install + smoke + tarball build.
# - push tag v[0-9]*.[0-9]*.[0-9]* -> install+smoke matrix -> build tarball ->
#   attach nirs4alldatasets_<version>.tar.gz to the matching Release (gated on a
#   non-pre-release tag).

name: release-r

on:
  workflow_dispatch: {}
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =========================================================================
  # Build the cdylib, install the R package against it, and run the smoke test
  # across the same OS/R matrix CRAN-class consumers use.
  # =========================================================================
  install-smoke:
    name: install + smoke / ${{ matrix.cfg.label }}
    runs-on: ${{ matrix.cfg.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - label: linux-release
            runs_on: ubuntu-22.04
            r_version: "release"
          - label: linux-devel
            runs_on: ubuntu-22.04
            r_version: "devel"
          - label: macos-arm64-release
            runs_on: macos-14
            r_version: "release"
          - label: windows-release
            runs_on: windows-2022
            r_version: "release"
    env:
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.cfg.r_version }}
          use-public-rspm: true

      # bindings/r/build_and_test.sh: builds nirs4all-datasets-capi (release),
      # exports N4DS_INCLUDE / N4DS_CAPI_DIR / N4DS_CORPUS, R CMD INSTALLs the
      # package against the prebuilt cdylib, and runs the smoke. Rtools provides
      # bash on Windows; the build dir is on PATH there so the DLL resolves at
      # runtime (Windows has no rpath, which the Makevars -Wl,-rpath sets on
      # ELF/Mach-O hosts).
      - name: Build cdylib, install R package, run smoke
        shell: bash
        run: |
          set -euo pipefail
          # Windows DLL resolution at smoke time. build_and_test.sh builds the
          # capi with the x86_64-pc-windows-gnu toolchain on Windows (to match
          # Rtools' mingw ABI), so put that target dir on PATH there too. Keep
          # both dirs on PATH defensively in case ld resolves the cdylib import lib.
          export PATH="$PWD/target/x86_64-pc-windows-gnu/release:$PWD/target/release:$PATH"
          bash bindings/r/build_and_test.sh

  # =========================================================================
  # Build the source tarball (R-universe / Release asset).
  # =========================================================================
  build-tarball:
    name: Build R source tarball
    needs: install-smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: R CMD build (produces nirs4alldatasets_<version>.tar.gz)
        run: |
          set -euo pipefail
          R CMD build bindings/r/nirs4alldatasets
          mkdir -p dist-r
          mv nirs4alldatasets_*.tar.gz dist-r/
          ls -la dist-r/

      - uses: actions/upload-artifact@v4
        with:
          name: nirs4alldatasets-r-tarball
          path: dist-r/nirs4alldatasets_*.tar.gz
          if-no-files-found: error
          retention-days: 90

  # =========================================================================
  # Attach the tarball to the GitHub Release on non-pre-release tags.
  # NOTE: this tarball is R-universe / Release-asset ONLY — it is NOT
  # CRAN-self-contained (it needs the prebuilt libnirs4all_datasets_capi).
  # =========================================================================
  publish-release-asset:
    name: Attach R tarball to GitHub Release
    needs: build-tarball
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nirs4alldatasets-r-tarball
          path: dist-r/

      - name: Upload to the matching Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-r/*.tar.gz
          fail_on_unmatched_files: true
