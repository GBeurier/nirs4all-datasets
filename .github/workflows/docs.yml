name: Site (GitHub Pages)

# Builds and deploys the interactive catalog site (src/nirs4all_datasets/site.py) to GitHub Pages.
# The site is pure rendering over the committed catalog + cards + assets, so the build needs only a
# few light dependencies (no nirs4all / matplotlib / heavy stack) and runs in seconds.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install site-render deps (no nirs4all needed)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pydantic python-dotenv
      - name: Build interactive catalog site
        run: PYTHONPATH=src python -c "from nirs4all_datasets.site import build_site; build_site('.', 'site')"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
