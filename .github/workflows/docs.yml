name: Site (GitHub Pages)

# Builds and deploys the interactive catalog site (src/nirs4all_datasets/site/) to GitHub Pages.
# The site renderer reads committed catalog/cards and renders inline SVG. It deliberately avoids the
# full qualification stack (nirs4all / pandas / matplotlib), but it does use the lightweight metric
# scoring helpers used to document dataset-property profiles.

on:
  push:
    branches: [main, redesign-v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install site-render deps (no nirs4all / pandas / matplotlib)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pydantic python-dotenv numpy scipy
      - name: Build the static catalog site
        run: PYTHONPATH=src python -c "from nirs4all_datasets.site import build_site; print(build_site('.', 'site'))"
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
