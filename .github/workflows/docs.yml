name: Site (GitHub Pages)

# Builds and deploys the interactive catalog site (src/nirs4all_datasets/site/) to GitHub Pages.
# The site renderer reads committed catalog/cards and renders inline SVG. It deliberately avoids the
# full qualification stack (nirs4all / pandas / matplotlib), but it does use the lightweight metric
# scoring helpers used to document dataset-property profiles.

on:
  push:
    branches: [main, redesign-v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install site-render deps (no nirs4all / pandas / matplotlib)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pydantic python-dotenv numpy scipy
      - name: Build the static catalog site
        run: PYTHONPATH=src python -c "from nirs4all_datasets.site import build_site; print(build_site('.', 'site'))"
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
