# SPDX-License-Identifier: MIT
# Fail the PR if any downstream binding manifest drifts from the canonical
# workspace version in the root Cargo.toml ([workspace.package] version):
#   - Cargo.toml [workspace.dependencies] nirs4all-datasets-core
#                                         (internal dep version, for crates.io)
#   - bindings/python/Cargo.toml          (Cargo SemVer)
#   - bindings/wasm/Cargo.toml            (Cargo SemVer)
#   - pyproject.toml [project] version    (PEP 440; the maturin wheel/sdist version)
#   - bindings/r/nirs4alldatasets/DESCRIPTION  (R version spelling; optional until it lands)
#
# The npm package.json (bindings/wasm/pkg-node/) is a gitignored wasm-pack build
# artifact, NOT a sync target — release-npm.yml injects the SoT version into the
# generated pkg-node/package.json at build time.
#
# Local equivalent:  scripts/bump_version.sh --check
#
# Bumping the version on a working branch:
#   scripts/bump_version.sh --bump X.Y.Z[-pre]   # rewrites the SoT
#   scripts/bump_version.sh                       # syncs every binding manifest

name: version-sync

on:
  push:
    branches: [main, 'rc/**']
  pull_request:
    branches: [main, 'rc/**']
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: manifest version consistency
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify scripts/bump_version.sh exists and is executable
        run: |
          if [ ! -x scripts/bump_version.sh ]; then
            echo "ERROR: scripts/bump_version.sh missing or not executable" >&2
            exit 1
          fi

      - name: Check every manifest is in sync with the Cargo workspace version
        run: scripts/bump_version.sh --check
