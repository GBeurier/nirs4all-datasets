# SPDX-License-Identifier: CECILL-2.1 OR AGPL-3.0-or-later
# GENERATED by ./configure (N4DS_R_VENDOR=1) — self-contained vendored workspace.
#
# This is the workspace ROOT for the vendored datasets + reader crates. They inherit
# version/edition/license/deps from [workspace.package] / [workspace.dependencies]
# below, which MIRROR the monorepo root Cargo.toml (the source tarball has no
# monorepo). src/Makevars builds `-p nirs4all-datasets-capi --offline` to produce
# the staticlib (libnirs4all_datasets_capi.a), which the C shim (src/n4ds.c) links.
[workspace]
resolver = "2"
members = [
    "vendored/nirs4all-datasets-core",
    "vendored/nirs4all-datasets-capi",
    "vendored/nirs4all-formats-core",
    "vendored/nirs4all-formats",
    "vendored/nirs4all-io-core",
    "vendored/nirs4all-io",
]

[workspace.package]
version = "0.3.8"
edition = "2021"
rust-version = "1.88"
license = "CECILL-2.1 OR AGPL-3.0-or-later"
authors = ["Gregory Beurier <gregory.beurier@cirad.fr>"]
repository = "https://github.com/GBeurier/nirs4all-datasets"
homepage = "https://github.com/GBeurier/nirs4all-datasets"
readme = "README.md"

[workspace.dependencies]
nirs4all-datasets-core = { path = "vendored/nirs4all-datasets-core", version = "0.3.8" }
nirs4all-formats-core = { path = "vendored/nirs4all-formats-core", version = "0.2.7" }
nirs4all-formats = { path = "vendored/nirs4all-formats", version = "0.2.7" }
nirs4all-io-core = { path = "vendored/nirs4all-io-core", version = "0.1.11" }
nirs4all-io = { path = "vendored/nirs4all-io", version = "0.1.11" }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order", "float_roundtrip"] }
thiserror = "2.0"
sha2 = "0.10"
hex = "0.4"
directories = "5"
ureq = "2"
zip = "2"
regex = "1.10"
toml = "0.8"
indexmap = { version = "2.2", features = ["serde"] }
csv = "1.3"

# Bound Cargo's release profile to a modest, reproducible setting (mirrors the
# monorepo root: opt-level 2 + strip debuginfo).
[profile.release]
opt-level = 2
strip = "debuginfo"
