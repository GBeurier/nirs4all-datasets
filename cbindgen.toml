language = "C"
header = """/*
 * nirs4all-datasets C ABI header (symbol prefix n4ds_).
 *
 * Generated by cbindgen; do not edit by hand. Refresh with:
 *   cargo build -p nirs4all-datasets-capi
 *
 * The committed copy under crates/nirs4all-datasets-capi/include/nirs4all_datasets.h
 * mirrors the latest build so downstream packagers can pin the header without
 * invoking cargo.
 *
 * SPDX-License-Identifier: MIT
 */"""
include_guard = "NIRS4ALL_DATASETS_H"
autogen_warning = "/* This file is auto-generated by cbindgen. */"
include_version = true
documentation = true
documentation_style = "c99"
trailer = ""

[parse]
parse_deps = false
clean = false

[export]
item_types = ["constants", "functions", "structs", "enums", "opaque", "typedefs"]

[defines]
"target_family = unix" = "N4DS_UNIX"
"target_family = windows" = "N4DS_WINDOWS"

[fn]
args = "vertical"

[struct]
derive_eq = false
